<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm - Admin</title>
  <link rel="stylesheet" href="css/admin-layout.css">
</head>
<body>

  <aside class="admin-sidebar" id="admin-sidebar-container"></aside>

  <main class="admin-main">
    <header class="admin-header">
      <h1>Quản lý Sản phẩm</h1>
      <div class="admin-user-info" id="admin-user-name">Đang tải...</div>
    </header>

    <div class="admin-card">
      <div class="admin-card-header">
        <h2>Danh sách Sản phẩm</h2>
        <div style="display:flex; gap:10px;">
          <select id="admin-category-filter" class="admin-form-control" onchange="clearSearchAndInit()" style="width: 180px;">
            <option value="">Tất cả danh mục</option>
          </select>
          <input type="text" id="admin-search-input" class="admin-form-control" placeholder="Tìm tên, thương hiệu..." onkeyup="if(event.key === 'Enter') clearCategoryAndInit()" style="width: 250px;">
          <button class="admin-btn admin-btn-primary" onclick="clearCategoryAndInit()">Tìm</button>
          <button class="admin-btn admin-btn-success" onclick="openAddModal()">+ Thêm sản phẩm</button>
        </div>
      </div>
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Hình ảnh</th>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Tồn kho</th>
            <th>Danh mục</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="product-table-body">
          <tr>
            <td colspan="7" class="text-center">Đang tải dữ liệu...</td>
          </tr>
        </tbody>
      </table>
      <div id="admin-pagination" class="admin-pagination" style="display:flex; justify-content:center; gap:10px; margin-top:20px; padding:10px;"></div>
    </div>
  </main>

  <div class="admin-modal" id="product-modal">
    <div class="admin-modal-content" style="max-width: 600px;">
      <div class="admin-modal-header">
        <h2 id="modal-title">Thêm Sản phẩm</h2>
        <button type="button" class="admin-modal-close">&times;</button>
      </div>
      <form id="product-form">
        <input type="hidden" id="prod-id">

        <div class="admin-form-group">
          <label>Tên sản phẩm</label>
          <input type="text" id="prod-name" class="admin-form-control" required>
        </div>

        <div class="admin-form-group">
          <label>Thương hiệu</label>
          <input type="text" id="prod-brand" class="admin-form-control" maxlength="100">
        </div>

        <div style="display:flex; gap:15px;">
          <div class="admin-form-group" style="flex:1;">
            <label>Giá (VNĐ)</label>
            <input type="number" id="prod-price" class="admin-form-control" required min="0">
          </div>
          <div class="admin-form-group" style="flex:1;">
            <label>Số lượng tồn kho</label>
            <input type="number" id="prod-stock" class="admin-form-control" required min="0">
          </div>
        </div>

        <div class="admin-form-group">
          <label>Danh mục</label>
          <select id="prod-category" class="admin-form-control" required>
            <option value="">Chọn danh mục</option>
          </select>
        </div>

        <div class="admin-form-group">
          <label>Đường dẫn hình ảnh (URL)</label>
          <input type="text" id="prod-img" class="admin-form-control">
          <input type="file" id="prod-img-file" class="admin-form-control" accept="image/*" style="margin-top: 10px;">
          <small id="prod-img-upload-status" style="display:block; margin-top: 8px; color:#666;"></small>
          <img id="prod-img-preview" src="" alt="preview" style="display:none; max-width: 100px; margin-top: 10px;">
        </div>

        <div class="admin-form-group">
          <label>Mô tả</label>
          <textarea id="prod-desc" class="admin-form-control"></textarea>
        </div>

        <button id="prod-save-btn" type="submit" class="admin-btn admin-btn-primary" style="width: 100%;">Lưu</button>
      </form>
    </div>
  </div>

  <script src="js/api.js?v=6"></script>
  <script src="js/admin.js?v=4"></script>
  <script>
    let products = [];
    let categories = [];
    let currentPage = 0;
    let totalPages = 0;
    const pageSize = 10;

    async function init(page = 0) {
      currentPage = page;
      const keyword = document.getElementById('admin-search-input') ? document.getElementById('admin-search-input').value.trim() : '';
      const categoryId = document.getElementById('admin-category-filter') ? document.getElementById('admin-category-filter').value : '';
      
      try {
        let productReq;
        // Logic tách biệt: Ưu tiên lọc theo danh mục trước (nếu có categoryId thì lờ keyword đi)
        if (categoryId) {
          productReq = api.product.getByCategory(categoryId, page, pageSize).then(unwrapApiData);
        } else {
          productReq = api.product.getAll(page, pageSize, keyword).then(unwrapApiData);
        }

        const [resProds, cats] = await Promise.all([
          productReq,
          api.category.getAll().then(unwrapApiData)
        ]);
        
        products = resProds.content || [];
        totalPages = resProds.totalPages || 0;
        currentPage = resProds.number || 0;
        categories = cats;
        
        renderCategoryFilter();
        renderCategorySelect();
        renderTable();
        renderPagination();
      } catch (error) {
        console.error(error);
        alert('Lỗi khi tải dữ liệu sản phẩm');
      }
    }

    function renderCategoryFilter() {
      const filter = document.getElementById('admin-category-filter');
      const currentValue = filter.value;
      filter.innerHTML = '<option value="">Tất cả danh mục</option>' +
        categories.map(c => `<option value="${c.id}" ${c.id == currentValue ? 'selected' : ''}>${c.name}</option>`).join('');
    }

    function renderCategorySelect() {
      const select = document.getElementById('prod-category');
      select.innerHTML = '<option value="">Chọn danh mục</option>' +
        categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function clearSearchAndInit() {
      if (document.getElementById('admin-search-input')) {
        document.getElementById('admin-search-input').value = '';
      }
      init(0);
    }

    function clearCategoryAndInit() {
      if (document.getElementById('admin-category-filter')) {
        document.getElementById('admin-category-filter').value = '';
      }
      init(0);
    }

    function renderTable() {
      const tbody = document.getElementById('product-table-body');
      if (!products || products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center">Chưa có sản phẩm nào</td></tr>';
        return;
      }

      tbody.innerHTML = products.map(p => `
        <tr>
          <td>${p.id}</td>
          <td><img src="${resolveImageUrl(p.imageUrl) || 'https://via.placeholder.com/50'}" alt="img" style="width:50px; height:50px; object-fit:cover;"></td>
          <td>
            <div style="font-weight:600;">${p.name}</div>
            <div style="font-size:12px; color:#666;">${p.brand || 'Không có thương hiệu'}</div>
          </td>
          <td>${Number(p.price).toLocaleString()} ₫</td>
          <td>${p.stockQuantity}</td>
          <td>${p.categoryName || 'N/A'}</td>
          <td class="action-btns">
            <button class="admin-btn admin-btn-warning" onclick="openEditModal(${p.id})">Sửa</button>
            <button class="admin-btn admin-btn-danger" onclick="deleteProduct(${p.id})">Xóa</button>
          </td>
        </tr>
      `).join('');
    }

    function renderPagination() {
      const container = document.getElementById('admin-pagination');
      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }

      let html = `<button class="admin-btn ${currentPage === 0 ? 'disabled' : ''}" ${currentPage === 0 ? 'disabled' : ''} onclick="init(${currentPage - 1})">Trước</button>`;
      
      for (let i = 0; i < totalPages; i++) {
        html += `<button class="admin-btn ${i === currentPage ? 'admin-btn-primary' : ''}" onclick="init(${i})">${i + 1}</button>`;
      }

      html += `<button class="admin-btn ${currentPage === totalPages - 1 ? 'disabled' : ''}" ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="init(${currentPage + 1})">Sau</button>`;
      
      container.innerHTML = html;
    }

    function openAddModal() {
      document.getElementById('modal-title').innerText = 'Thêm Sản phẩm';
      document.getElementById('product-form').reset();
      document.getElementById('prod-id').value = '';
      document.getElementById('prod-img').value = '';
      document.getElementById('prod-img-file').value = '';
      document.getElementById('prod-img-upload-status').innerText = '';
      document.getElementById('prod-img-preview').style.display = 'none';
      window.showModal('product-modal');
    }

    function openEditModal(id) {
      const p = products.find(prod => prod.id === id);
      if (!p) return;

      document.getElementById('modal-title').innerText = 'Sửa Sản phẩm';
      document.getElementById('prod-id').value = p.id;
      document.getElementById('prod-name').value = p.name;
      document.getElementById('prod-brand').value = p.brand || '';
      document.getElementById('prod-price').value = p.price;
      document.getElementById('prod-stock').value = p.stockQuantity;
      document.getElementById('prod-desc').value = p.description || '';
      document.getElementById('prod-category').value = p.categoryId || '';
      document.getElementById('prod-img').value = p.imageUrl || '';
      document.getElementById('prod-img-file').value = '';
      document.getElementById('prod-img-upload-status').innerText = '';

      if (p.imageUrl) {
        document.getElementById('prod-img-preview').src = p.imageUrl;
        document.getElementById('prod-img-preview').style.display = 'block';
      } else {
        document.getElementById('prod-img-preview').style.display = 'none';
      }

      window.showModal('product-modal');
    }

    function updateImagePreview(url) {
      const preview = document.getElementById('prod-img-preview');
      const resolvedUrl = resolveImageUrl(url);
      if (url) {
        preview.src = resolvedUrl;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    }

    function resolveImageUrl(url) {
      if (!url) return '';
      if (url.startsWith('http://') || url.startsWith('https://')) return url;
      if (url.startsWith('/')) return `${api.getApiOrigin()}${url}`;
      return `${api.getApiOrigin()}/uploads/products/${url}`;
    }

    document.getElementById('prod-img').addEventListener('input', function () {
      updateImagePreview(this.value);
    });

    document.getElementById('prod-img-file').addEventListener('click', function (e) {
      e.stopPropagation();
    });

    document.getElementById('prod-img-file').addEventListener('change', function (e) {
      e.stopPropagation();
      const file = this.files[0];
      const status = document.getElementById('prod-img-upload-status');

      if (!file) {
        status.innerText = '';
        return;
      }

      // Only preview at selection time. Actual upload happens when user clicks Save.
      const localPreviewUrl = URL.createObjectURL(file);
      updateImagePreview(localPreviewUrl);
      status.innerText = 'Đã chọn ảnh. Ảnh sẽ được upload khi bấm Lưu.';
    });

    document.getElementById('product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!e.submitter || e.submitter.id !== 'prod-save-btn') {
        return;
      }
      const id = document.getElementById('prod-id').value;

      let imageUrl = document.getElementById('prod-img').value;
      const selectedFile = document.getElementById('prod-img-file').files[0];
      const uploadStatus = document.getElementById('prod-img-upload-status');

      if (selectedFile) {
        try {
          uploadStatus.innerText = 'Đang upload ảnh...';
          const uploadRes = await api.product.uploadImage(selectedFile);
          imageUrl = unwrapApiData(uploadRes);
          document.getElementById('prod-img').value = imageUrl;
          uploadStatus.innerText = 'Upload ảnh thành công';
        } catch (error) {
          console.error(error);
          uploadStatus.innerText = '';
          alert('Upload ảnh thất bại: ' + error.message);
          return;
        }
      }

      const payload = {
        name: document.getElementById('prod-name').value,
        brand: document.getElementById('prod-brand').value.trim(),
        description: document.getElementById('prod-desc').value,
        price: parseFloat(document.getElementById('prod-price').value),
        stockQuantity: parseInt(document.getElementById('prod-stock').value),
        categoryId: parseInt(document.getElementById('prod-category').value),
        imageUrl,
        status: 'ACTIVE'
      };

      try {
        if (id) {
          await api.product.update(id, payload);
          alert('Cập nhật thành công!');
        } else {
          await api.product.create(payload);
          alert('Thêm thành công!');
        }
        window.hideModal('product-modal');
        init();
      } catch (error) {
        console.error(error);
        alert('Có lỗi xảy ra: ' + error.message);
      }
    });

    async function deleteProduct(id) {
      if (!confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')) return;
      try {
        await api.product.delete(id);
        alert('Xóa thành công!');
        init();
      } catch (error) {
        console.error(error);
        alert('Lỗi: ' + error.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => init(0));
  </script>
</body>
</html>
