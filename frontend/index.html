<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - E-commerce</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  
  <nav id="app-navbar" class="navbar"></nav>

  <main class="container">
    <section class="hero">
      <h1 class="page-title">Mua sắm thông minh, giá tuyệt vời</h1>
      <p class="page-subtitle">Khám phá hàng ngàn sản phẩm công nghệ chất lượng cao.</p>
      <a href="products.html" class="btn btn-primary">Khám phá ngay</a>
    </section>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2>Sản phẩm nổi bật</h2>
      <div style="display: flex; gap: 0.5rem;">
        <input type="text" id="home-search-input" class="form-input" placeholder="Tìm tên, thương hiệu..." onkeyup="if(event.key === 'Enter') loadFeaturedProducts(0)">
        <button class="btn btn-primary" onclick="loadFeaturedProducts(0)">Tìm</button>
      </div>
    </div>
    <div id="featured-products" class="grid grid-cols-4 gap-6">
      <p>Đang tải...</p>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="pagination"></div>
  </main>

  <footer class="footer">
    <div class="container">
      &copy; 2026 ShopVN. All rights reserved.
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function loadFeaturedProducts(page = 0) {
      const container = document.getElementById('featured-products');
      const paginationContainer = document.getElementById('pagination');
      const keyword = document.getElementById('home-search-input') ? document.getElementById('home-search-input').value.trim() : '';
      container.innerHTML = '<p>Đang tải...</p>';
      
      try {
        const res = await api.product.getAll(page, 8, keyword); // Lấy 8 sản phẩm mỗi trang cho trang chủ
        const products = res.data?.content || [];

        if (products.length === 0) {
          container.innerHTML = '<p>Không có sản phẩm nào.</p>';
          paginationContainer.innerHTML = '';
          return;
        }

        container.innerHTML = products.map(p => `
          <a href="product-detail.html?id=${p.id}" class="glass-card product-card">
            <div class="product-img-wrap">
              ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : `<span style="font-size: 3rem">📦</span>`}
            </div>
            <div>
              <p style="font-size: 0.75rem; color: var(--color-accent-primary)">${p.categoryName || 'Sản phẩm'}</p>
              <h3 class="product-name" title="${p.name}">${p.name}</h3>
              ${p.brand ? `<p style="font-size: 0.85rem; color: var(--color-text-secondary); margin-bottom: 0.75rem;">${p.brand}</p>` : ''}
              <div class="product-card-actions">
                <span class="product-price">${formatPrice(p.price)}</span>
                <span class="btn btn-primary btn-sm product-detail-btn">Xem chi tiết</span>
              </div>
            </div>
          </a>
        `).join('');

        renderPagination(res.data?.totalPages || 0, res.data?.number || 0);
      } catch (err) {
        container.innerHTML = '<p style="color:var(--color-danger)">Lỗi tải sản phẩm.</p>';
      }
    }

    function renderPagination(totalPages, currentPage) {
      const container = document.getElementById('pagination');
      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }

      let html = `<button class="page-btn" ${currentPage === 0 ? 'disabled' : ''} onclick="loadFeaturedProducts(${currentPage - 1})">&laquo;</button>`;
      
      for (let i = 0; i < totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadFeaturedProducts(${i})">${i + 1}</button>`;
      }

      html += `<button class="page-btn" ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="loadFeaturedProducts(${currentPage + 1})">&raquo;</button>`;
      
      container.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', () => loadFeaturedProducts(0));
  </script>
</body>
</html>
