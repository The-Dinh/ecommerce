<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang Cá Nhân - ShopVN</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-container {
      max-width: 600px;
      margin: 4rem auto;
      padding: 2.5rem;
    }
  </style>
</head>
<body>
  
  <nav id="app-navbar" class="navbar"></nav>

  <main class="container">
    <div class="glass-card profile-container">
      <h2 style="text-align:center; margin-bottom: 20px;">Thông tin cá nhân</h2>
      
      <form id="profile-form" onsubmit="handleUpdateProfile(event)">
        <div class="form-group">
          <label class="form-label">Tên đăng nhập (Username)</label>
          <input type="text" id="prof-username" class="form-input" disabled style="background:#eaeced;">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="prof-email" class="form-input" disabled style="background:#eaeced;">
        </div>
        <div class="form-group">
          <label class="form-label">Họ và tên</label>
          <input type="text" id="prof-fullName" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Số điện thoại</label>
          <input type="tel" id="prof-phone" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Địa chỉ</label>
          <input type="text" id="prof-address" class="form-input">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Cập nhật thông tin</button>
      </form>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function initProfile() {
      if (!api.getToken()) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const user = await api.user.getMe();
        document.getElementById('prof-username').value = user.username || '';
        document.getElementById('prof-email').value = user.email || '';
        document.getElementById('prof-fullName').value = user.fullName || '';
        document.getElementById('prof-phone').value = user.phone || '';
        document.getElementById('prof-address').value = user.address || '';
      } catch (err) {
        showToast('Lỗi tải thông tin cá nhân', 'error');
        if (err.message.includes('401')) {
          api.setToken(null);
          setTimeout(() => window.location.href = 'login.html', 1000);
        }
      }
    }

    async function handleUpdateProfile(e) {
      e.preventDefault();
      
      const payload = {
        fullName: document.getElementById('prof-fullName').value,
        phone: document.getElementById('prof-phone').value,
        address: document.getElementById('prof-address').value
      };

      try {
        await api.user.updateMe(payload);
        showToast('Cập nhật thông tin thành công!', 'success');
        
        // Update local storage
        const user = await api.user.getMe();
        localStorage.setItem('user', JSON.stringify({
          id: user.id, fullName: user.fullName || user.username, email: user.email, role: user.role
        }));
        
        // Refresh navbar
        if (typeof renderNavbar === 'function') {
          renderNavbar();
        }
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', initProfile);
  </script>
</body>
</html>
