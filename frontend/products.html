<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản phẩm - ShopVN</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/products.css">
</head>
<body>
  
  <nav id="app-navbar" class="navbar"></nav>

  <main class="container">
    <div class="layout">
      <!-- Sidebar Filters -->
      <aside>
        <div class="filters">
          <h3 style="margin-bottom: 1rem;">Danh mục</h3>
          <div class="category-list" id="category-list">
            <div class="category-item active" onclick="filterByCategory(null)">Tất cả</div>
            <p>Đang tải...</p>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <div>
        <div id="products-grid" class="grid grid-cols-3 gap-6">
          <p>Đang tải...</p>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination"></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    let activeCategoryId = null;
    let allProducts = [];
    let currentPage = 0;
    const pageSize = 12;

    async function init() {
      await loadCategories();
      await loadProducts(0);
    }

    async function loadCategories() {
      const list = document.getElementById('category-list');
      try {
        const res = await api.category.getAll();
        const cats = res.data || [];
        list.innerHTML = `
          <div class="category-item active" id="cat-all" onclick="filterByCategory(null)">Tất cả</div>
          ${cats.map(c => `<div class="category-item" id="cat-${c.id}" onclick="filterByCategory(${c.id})">${c.name}</div>`).join('')}
        `;
      } catch {
        list.innerHTML = '<p>Lỗi tải danh mục.</p>';
      }
    }

    async function loadProducts(page = 0) {
      currentPage = page;
      const grid = document.getElementById('products-grid');
      const paginationContainer = document.getElementById('pagination');
      grid.innerHTML = '<p>Đang tải...</p>';
      
      try {
        let res;
        if (activeCategoryId) {
          res = await api.product.getByCategory(activeCategoryId, page, pageSize);
        } else {
          res = await api.product.getAll(page, pageSize);
        }
        allProducts = res.data?.content || [];
        renderPagination(res.data?.totalPages || 0, res.data?.number || 0);
        renderProducts();
      } catch {
        grid.innerHTML = '<p style="color:var(--color-danger)">Lỗi tải sản phẩm.</p>';
      }
    }

    function renderProducts() {
      const grid = document.getElementById('products-grid');

      if (allProducts.length === 0) {
        grid.innerHTML = '<p>Không tìm thấy sản phẩm nào.</p>';
        return;
      }

      grid.innerHTML = allProducts.map(p => `
        <a href="product-detail.html?id=${p.id}" class="glass-card product-card">
          <div class="product-img-wrap">
            ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : `<span style="font-size: 3rem">📦</span>`}
          </div>
          <div>
            <p style="font-size: 0.75rem; color: var(--color-accent-primary)">${p.categoryName || 'Sản phẩm'}</p>
            <h3 class="product-name" title="${p.name}">${p.name}</h3>
            ${p.brand ? `<p style="font-size: 0.85rem; color: var(--color-text-secondary); margin-bottom: 0.75rem;">${p.brand}</p>` : ''}
            <div class="product-card-actions">
              <span class="product-price">${formatPrice(p.price)}</span>
              <span class="btn btn-primary btn-sm product-detail-btn">Xem chi tiết</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    function renderPagination(totalPages, currentPage) {
      const container = document.getElementById('pagination');
      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }

      let html = `<button class="page-btn" ${currentPage === 0 ? 'disabled' : ''} onclick="loadProducts(${currentPage - 1})">&laquo;</button>`;
      
      for (let i = 0; i < totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadProducts(${i})">${i + 1}</button>`;
      }

      html += `<button class="page-btn" ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="loadProducts(${currentPage + 1})">&raquo;</button>`;
      
      container.innerHTML = html;
    }

    function filterByCategory(id) {
      activeCategoryId = id;
      document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
      const activeEl = document.getElementById(id ? `cat-${id}` : 'cat-all');
      if (activeEl) activeEl.classList.add('active');
      loadProducts(0);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
