# =============================
# Application Configuration
# =============================
spring.application.name=ecommerce

# =============================
# Database Configuration
# =============================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=021205
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================
# JPA / Hibernate Configuration
# =============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================
# Server Configuration
# =============================
server.port=8080

# =============================
# JWT / Auth Configuration
# =============================
app.jwt.secret=${JWT_SECRET:change-this-jwt-secret-before-production-please-0123456789abcdef}
app.jwt.access-token-expiration-minutes=15
