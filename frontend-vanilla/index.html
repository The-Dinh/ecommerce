<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - E-commerce</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero {
      text-align: center;
      padding: 4rem 1rem;
      background: radial-gradient(circle at center, var(--color-bg-tertiary), var(--color-bg-primary));
      border-radius: var(--radius-2xl);
      margin-bottom: 3rem;
    }
  </style>
</head>
<body>
  
  <nav id="app-navbar" class="navbar"></nav>

  <main class="container">
    <section class="hero">
      <h1 class="page-title">Mua sắm thông minh, giá tuyệt vời</h1>
      <p class="page-subtitle">Khám phá hàng ngàn sản phẩm công nghệ chất lượng cao.</p>
      <a href="products.html" class="btn btn-primary">Khám phá ngay</a>
    </section>

    <h2 style="margin-bottom: 2rem;">Sản phẩm nổi bật</h2>
    <div id="featured-products" class="grid grid-cols-4 gap-6">
      <p>Đang tải...</p>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      &copy; 2026 ShopVN. All rights reserved.
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function loadFeaturedProducts() {
      const container = document.getElementById('featured-products');
      try {
        const res = await api.product.getAll();
        const products = (res.data || []).slice(0, 8); // Lấy 8 sản phẩm đầu tiên

        if (products.length === 0) {
          container.innerHTML = '<p>Không có sản phẩm nào.</p>';
          return;
        }

        container.innerHTML = products.map(p => `
          <div class="glass-card product-card">
            <div class="product-img-wrap">
              ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : `<span style="font-size: 3rem">📦</span>`}
            </div>
            <div>
              <p style="font-size: 0.75rem; color: var(--color-accent-primary)">${p.categoryName || 'Sản phẩm'}</p>
              <h3 class="product-name" title="${p.name}">${p.name}</h3>
              <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top: 1rem;">
                <span class="product-price">${formatPrice(p.price)}</span>
                <a href="product-detail.html?id=${p.id}" class="btn btn-primary btn-sm">Xem chi tiết</a>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = '<p style="color:var(--color-danger)">Lỗi tải sản phẩm.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadFeaturedProducts);
  </script>
</body>
</html>
