<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản phẩm - ShopVN</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 2rem;
    }
    .filters {
      position: sticky;
      top: calc(var(--navbar-height) + 2rem);
    }
    .category-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .category-item {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      transition: all 0.2s;
    }
    .category-item:hover {
      border-color: var(--color-border-hover);
    }
    .category-item.active {
      background: var(--color-accent-gradient);
      color: #fff;
      border-color: transparent;
    }
    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  
  <nav id="app-navbar" class="navbar"></nav>

  <main class="container">
    <div class="layout">
      <!-- Sidebar Filters -->
      <aside>
        <div class="filters">
          <h3 style="margin-bottom: 1rem;">Danh mục</h3>
          <div class="category-list" id="category-list">
            <div class="category-item active" onclick="filterByCategory(null)">Tất cả</div>
            <p>Đang tải...</p>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <div>
        <div class="search-bar">
          <input type="text" id="search-input" class="form-input" placeholder="Tìm kiếm sản phẩm..." onkeyup="handleSearch(event)">
          <button class="btn btn-primary" onclick="loadProducts()">Tìm</button>
        </div>

        <div id="products-grid" class="grid grid-cols-3 gap-6">
          <p>Đang tải...</p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    let activeCategoryId = null;
    let allProducts = [];

    async function init() {
      await loadCategories();
      await loadProducts();
    }

    async function loadCategories() {
      const list = document.getElementById('category-list');
      try {
        const res = await api.category.getAll();
        const cats = res.data || [];
        list.innerHTML = `
          <div class="category-item active" id="cat-all" onclick="filterByCategory(null)">Tất cả</div>
          ${cats.map(c => `<div class="category-item" id="cat-${c.id}" onclick="filterByCategory(${c.id})">${c.name}</div>`).join('')}
        `;
      } catch {
        list.innerHTML = '<p>Lỗi tải danh mục.</p>';
      }
    }

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '<p>Đang tải...</p>';
      try {
        let res;
        if (activeCategoryId) {
          res = await api.product.getByCategory(activeCategoryId);
        } else {
          res = await api.product.getAll();
        }
        allProducts = res.data || [];
        renderProducts();
      } catch {
        grid.innerHTML = '<p style="color:var(--color-danger)">Lỗi tải sản phẩm.</p>';
      }
    }

    function renderProducts() {
      const grid = document.getElementById('products-grid');
      const keyword = document.getElementById('search-input').value.toLowerCase();
      
      const filtered = allProducts.filter(p => !keyword || p.name.toLowerCase().includes(keyword));

      if (filtered.length === 0) {
        grid.innerHTML = '<p>Không tìm thấy sản phẩm nào.</p>';
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="glass-card product-card">
          <div class="product-img-wrap">
            ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : `<span style="font-size: 3rem">📦</span>`}
          </div>
          <div>
            <p style="font-size: 0.75rem; color: var(--color-accent-primary)">${p.categoryName || 'Sản phẩm'}</p>
            <h3 class="product-name" title="${p.name}">${p.name}</h3>
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top: 1rem;">
              <span class="product-price">${formatPrice(p.price)}</span>
              <a href="product-detail.html?id=${p.id}" class="btn btn-primary btn-sm">Xem chi tiết</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterByCategory(id) {
      activeCategoryId = id;
      document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
      document.getElementById(id ? `cat-${id}` : 'cat-all').classList.add('active');
      loadProducts();
    }

    function handleSearch(e) {
      if(e.key === 'Enter') loadProducts();
      else renderProducts(); // Client side filtering
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
